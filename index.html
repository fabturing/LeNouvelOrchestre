<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link href="style.css" rel="stylesheet" />
    <script src="http://unpkg.com/tone"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/Block.js"></script>
    <script src="js/Agent.js"></script>
    <script src="js/Agents.js"></script>
    <script src="js/Orchestra.js"></script>
        <script src="js/testSon.js"></script>
    <title>Band</title>
  </head>
  <body>
    <template id="agent-debug-box">
      <div class="agent-debug-box">
        <table>
          <thead><tr><th colspan="2">Agent</th></tr></thead>
          <tbody>
            <tr><th scope="row">Name</th><td><span data-attribute="name"></span></td></tr>
            <tr><th scope="row">Description</th><td><span data-attribute="descritption"></span></td></tr>
            <tr><th scope="row">Pattern</th><td><span data-attribute="pattern"></span></td></tr>
            <tr><th scope="row">Scale</th><td><span data-attribute="scale"></span></td></tr>
            <tr><th scope="row">Aura</th><td><span data-attribute="aura"></span></td></tr>
            <tr><th scope="row">Current Block</th><td><span data-attribute="currentBlockRepr"></span></td></tr>
          </tbody>
        </table>
    </template>

    <button id="test-son">testSon</button>
    <button id="play">play</button>
    <button id="stop">stop</button>
  </body>
</html>
